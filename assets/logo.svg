<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="orbitGrad" x1="70" y1="60" x2="250" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F472B6"></stop>
      <stop offset="0.45" stop-color="#8B5CF6"></stop>
      <stop offset="1" stop-color="#22D3EE"></stop>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.84"></stop>
    </radialGradient>

    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="280" height="280" rx="72" fill="#111827" stroke="rgba(255,255,255,0.14)" stroke-width="3"></rect>

  <ellipse cx="160" cy="160" rx="86" ry="52" stroke="url(#orbitGrad)" stroke-width="16" stroke-linecap="round" filter="url(#glow2)"></ellipse>

  <ellipse cx="160" cy="160" rx="52" ry="86" stroke="url(#orbitGrad)" stroke-opacity="0.9" stroke-width="10" stroke-linecap="round"></ellipse>

  <circle cx="104" cy="150" r="8" fill="#F472B6"></circle>
  <circle cx="224" cy="176" r="8" fill="#22D3EE"></circle>
  <circle cx="176" cy="88" r="7" fill="#A78BFA"></circle>

  <circle cx="160" cy="160" r="44" fill="url(#coreGlow)"></circle>
  <text x="160" y="171" text-anchor="middle" font-size="33" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-style="italic" letter-spacing="1.8" fill="#6D28D9">L.P</text>
</svg>